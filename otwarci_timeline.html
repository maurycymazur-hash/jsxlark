  <!-- React + ReactDOM from CDN (no build step needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone: compiles JSX in the browser at runtime -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Google Font for a polished look -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* Reset and base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2e 50%, #0a0a1a 100%);
      min-height: 100vh;
      color: #e8e8f0;
      /* Prevent horizontal scroll on small Lark iframes */
      overflow-x: hidden;
    }
    /* Smooth scrolling for anchor links */
    html { scroll-behavior: smooth; }
    /* Ensure the React root fills the page */
    #root { min-height: 100vh; }

    /* Custom scrollbar to match dark theme */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a1a; }
    ::-webkit-scrollbar-thumb { background: #333355; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- type="text/babel" tells Babel standalone to compile this block -->

      {

        label: "TikTok Stars Contest",
        month: "Weeks 16–24",
        phase: 2,
        accent: "#06d6a0",
        icon: "🏆",
        summary: "Media partnership contest + awards gala",
        details: [
          "Media partner: Gazele Pulsu Biznesu or Diamenty Forbesa",
          "Two categories: TikTok Stars + Rising TikTok Stars",
          "Hashtag activation: #OtwarciNaBiznes",
          "Final Awards Gala with VIP presenters",
          "Media series of winner interviews & success stories",
        ],
        output: "National media reach + 3M+ TikTok views",
      },
      {
        id: 6,
        label: "Wrap-up & Report",
        month: "Weeks 22–28",
        phase: 2,
        accent: "#4cc9f0",
        icon: "📊",
        summary: "Measure impact, publish findings",
        details: [
          "Final report: reach, lead volume, onboarding outcomes",

          "Survey: % of participants who increased sales",
          "Media interviews with contest finalists",
          "Data shared at TikTok Gala",
        ],
        output: "Published report + 5M+ media reach",
      },
    ];

    const ambassadorSteps = [
      {
        num: 1,
        title: "Assignment",
        timing: "Wks 5–20 (rolling)",
        desc: "OFF qualifies each eligible lead and assigns them to a named ambassador, starting in parallel with the conference series — so leads from early events are not left waiting.",

      },
      {

        desc: "A 20–30 minute call to assess the entrepreneur's starting point — profile, offer, sales readiness — and agree on concrete next steps.",
        color: "#f72585",
      },
      {
        num: 3,
        title: "Audit + Plan",
        timing: "Engagement wk 1",
        desc: "Quick profile/content audit followed by a simple 14-day action plan — the 'Otwarci na Biznes Challenge' — tailored to the entrepreneur's business.",
        color: "#7209b7",
      },
      {
        num: 4,
        title: "Execution Support",
        timing: "Engagement wks 1–2",
        desc: "Content guidance and video production support (leveraging OFF's dedicated video operators/editors), plus light-touch check-ins. Once the entrepreneur has a functioning profile and is producing content, the ambassador assesses Shop readiness. When the lead is warm, the ambassador escalates to TikTok SMB Sales and steps back — the commercial conversation is fully owned by the TikTok team from that point.",
        color: "#4cc9f0",
      },
      {
        num: 5,
        title: "Graduation",
        timing: "Engagement wk 2",
        desc: "Summary of outcomes (profile optimised, content plan created, first LIVE/Shop steps completed) and identification of next-step needs. Trackable output for TikTok reporting.",
        color: "#06d6a0",
      },
    ];

    const roleRows = [
      {
        area: "Primary purpose",
        off: "Help qualified leads take their first concrete steps on TikTok: setting up a basic profile from scratch, or — where a profile already exists — making the next meaningful improvement such as professional content creation.",
        ttk: "Convert warm leads into TikTok Shop users and manage the full Shop onboarding process — from first commercial conversation through to an active, selling presence on the platform.",
      },
      {
        area: "Scope",
        off: "Profile setup for businesses new to TikTok; content quality improvement and next-step guidance for businesses that already have an account but need help growing it.",
        ttk: "TikTok Shop onboarding end-to-end: commercial conversation, eligibility assessment, Shop account setup, seller tooling guidance, and ongoing sales enablement.",
      },
      {
        area: "Typical activities",
        off: "Profile creation and audit; bio and visual identity setup; basic content planning and format guidance; helping businesses produce more professional video content; check-ins and templates.",
        ttk: "Commercial discovery calls; TikTok Shop eligibility and requirements walkthrough; Shop account activation; seller onboarding workflow; logistics and fulfilment guidance; pipeline management.",
      },
      {
        area: "Outputs",
        off: "A live, optimised TikTok profile with a content plan in place — and a lead that is now warm enough to be handed over for Shop onboarding.",
        ttk: "Active TikTok Shop account; seller onboarding completed; first sales activity initiated; lead tracked in sales pipeline.",
      },
      {
        area: "Engagement trigger",
        off: "Assigned after initial qualification; supports all leads who need help with profile setup or content improvement and are not yet ready for Shop onboarding.",
        ttk: "Triggered when a lead is warm and ready to open a TikTok Shop — escalated by the OFF ambassador, who hands off and steps back once the commercial conversation begins.",
      },
    ];

    const kpis = [
      { value: ">2,000", label: "SME leads for TikTok Shop", color: "#4cc9f0" },
      { value: "1,700", label: "Entrepreneurs trained", color: "#f72585" },
      { value: "4–6", label: "Regional conferences", color: "#7209b7" },
      { value: "20", label: "Partner trainings", color: "#ff9f1c" },
      { value: "5M+", label: "Media reach", color: "#06d6a0" },
      { value: "3M+", label: "TikTok educational views", color: "#4cc9f0" },
    ];

    /* ─── SUB-COMPONENTS ────────────────────────────────────────────────── */

    function TabButton({ id, active, onClick, children }) {
      return (
        <button
          onClick={() => onClick(id)}
          style={{
            padding: "10px 22px",
            borderRadius: 40,
            border: active ? "1px solid #4cc9f0" : "1px solid rgba(255,255,255,0.12)",
            background: active ? "rgba(76,201,240,0.15)" : "transparent",
            color: active ? "#4cc9f0" : "#8888aa",
            cursor: "pointer",
            fontSize: 13,
            fontWeight: 700,
            letterSpacing: 0.4,
            transition: "all 0.2s",
            fontFamily: "'DM Sans', sans-serif",
          }}
        >
          {children}
        </button>
      );
    }

    /* ─── TIMELINE TAB ──────────────────────────────────────────────────── */
    /*
     * Design: a real horizontal track runs across the full width.
     * The track is split into two coloured bands showing which phase each
     * stage belongs to, with a visible overlap zone where Phase 2 starts
     * while Phase 1 is still running (mid-April).
     * Nodes sit ON the track; a vertical stem drops to a card below.
     * Clicking a card expands it in place — no layout jump.
     */

    function TimelineTab() {
      const [activeStage, setActiveStage] = useState(null);
      const toggle = (id) => setActiveStage(prev => prev === id ? null : id);

      // Evenly spaced node positions as percentages of the track width.
      // We use 6 stages. Positions run from ~8% to ~92% so nodes don't
      // sit right at the edges.
      const positions = [8, 24, 40, 56, 72, 88];

      // The overlap zone sits between stage 3 (index 2) and stage 4 (index 3).
      // We draw it as a gradient rectangle spanning those two node positions.
      const overlapLeft  = `${positions[2]}%`;
      const overlapRight = `${100 - positions[3]}%`;

      return (
        <div>

          {/* ── Phase legend ── */}
          <div style={{ display: "flex", gap: 20, marginBottom: 32, flexWrap: "wrap", justifyContent: "center" }}>
            {[
              { label: "Phase 1 — Awareness & Lead Generation", color: "#4cc9f0", stages: "Weeks 4–20" },
              { label: "Phase 2 — Conversion & Adoption",       color: "#ff9f1c", stages: "Weeks 5–28" },
            ].map(p => (
              <div key={p.label} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                {/* A short track segment, not just a dash */}
                <div style={{
                  width: 40, height: 6, borderRadius: 3,
                  background: p.color,
                  boxShadow: `0 0 10px ${p.color}88`,
                }} />
                <div>
                  <div style={{ fontSize: 12, color: "#ccccee", fontWeight: 600 }}>{p.label}</div>
                  <div style={{ fontSize: 10, color: "#666688" }}>{p.stages}</div>
                </div>
              </div>
            ))}
            {/* Overlap indicator */}
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 40, height: 6, borderRadius: 3,
                background: "linear-gradient(90deg, #4cc9f0, #ff9f1c)",
                boxShadow: "0 0 10px rgba(255,159,28,0.4)",
              }} />
              <div>
                <div style={{ fontSize: 12, color: "#ccccee", fontWeight: 600 }}>Phase overlap from mid-April</div>
                <div style={{ fontSize: 10, color: "#666688" }}>Phases 1 & 2 run in parallel</div>
              </div>
            </div>
          </div>

          {/* ── The track + nodes + cards ── */}
          <div style={{ position: "relative", paddingBottom: 8 }}>

            {/* TRACK LAYER — sits behind everything */}
            <div style={{ position: "relative", height: 6, marginBottom: 0, marginLeft: "0%", marginRight: "0%" }}>

              {/* Phase 1 segment: left edge → midpoint of overlap */}
              <div style={{
                position: "absolute",
                left: 0,
                right: "44%",   /* stops at ~56% which is stage 4's position */
                height: "100%",
                background: "linear-gradient(90deg, #4cc9f088, #4cc9f0cc)",
                borderRadius: "4px 0 0 4px",
              }} />

              {/* Overlap gradient segment */}
              <div style={{
                position: "absolute",
                left: "38%",
                right: "38%",
                height: "100%",
                background: "linear-gradient(90deg, #4cc9f0, #ff9f1c)",
                boxShadow: "0 0 14px rgba(255,159,28,0.5)",
                zIndex: 1,
              }} />

              {/* Phase 2 segment: midpoint of overlap → right edge */}
              <div style={{
                position: "absolute",
                left: "44%",
                right: 0,
                height: "100%",
                background: "linear-gradient(90deg, #ff9f1ccc, #06d6a088)",
                borderRadius: "0 4px 4px 0",
              }} />
            </div>

            {/* NODE + STEM + CARD COLUMNS — absolutely positioned over the track */}
            <div style={{ position: "relative", marginTop: -3 }}>
              {stages.map((stage, i) => {
                const isActive = activeStage === stage.id;
                const leftPct  = positions[i];

                return (
                  <div
                    key={stage.id}
                    style={{
                      position: "absolute",
                      left: `${leftPct}%`,
                      transform: "translateX(-50%)",
                      width: 155,
                      display: "flex",
                      flexDirection: "column",
                      alignItems: "center",
                    }}
                  >
                    {/* Node circle — sits ON the track */}
                    <div
                      onClick={() => toggle(stage.id)}
                      style={{
                        width: 44,
                        height: 44,
                        borderRadius: "50%",
                        background: isActive ? stage.accent : `linear-gradient(135deg, ${stage.accent}33, ${stage.accent}11)`,
                        border: `2.5px solid ${stage.accent}`,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        fontSize: 18,
                        cursor: "pointer",
                        boxShadow: isActive ? `0 0 22px ${stage.accent}cc` : `0 0 8px ${stage.accent}44`,
                        transition: "all 0.2s",
                        zIndex: 3,
                        position: "relative",
                        flexShrink: 0,
                      }}
                    >
                      {stage.icon}
                    </div>

                    {/* Vertical stem connecting node to card */}
                    <div style={{
                      width: 2,
                      height: 16,
                      background: `linear-gradient(180deg, ${stage.accent}99, ${stage.accent}33)`,
                      flexShrink: 0,
                    }} />

                    {/* Card */}
                    <div
                      onClick={() => toggle(stage.id)}
                      style={{
                        width: "100%",
                        background: isActive
                          ? `linear-gradient(160deg, ${stage.accent}1a, rgba(255,255,255,0.05))`
                          : "rgba(255,255,255,0.04)",
                        border: `1px solid ${isActive ? stage.accent : "rgba(255,255,255,0.08)"}`,
                        borderRadius: 12,
                        padding: "11px 10px",
                        cursor: "pointer",
                        boxShadow: isActive ? `0 6px 28px ${stage.accent}22` : "none",
                        transition: "all 0.2s",
                      }}
                    >
                      {/* Timing badge */}
                      <div style={{
                        fontSize: 9, color: stage.accent, fontWeight: 700,
                        letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 5,
                        background: `${stage.accent}18`,
                        borderRadius: 4, padding: "2px 5px",
                        display: "inline-block",
                      }}>
                        {stage.month}
                      </div>

                      <div style={{ fontSize: 11, fontWeight: 700, color: "#ffffff", marginBottom: 4, lineHeight: 1.3 }}>
                        {stage.label}
                      </div>
                      <div style={{ fontSize: 10, color: "#8888aa", lineHeight: 1.5 }}>
                        {stage.summary}
                      </div>

                      {/* Expanded details */}
                      {isActive && (
                        <div style={{ marginTop: 10, borderTop: `1px solid ${stage.accent}33`, paddingTop: 10 }}>
                          <ul style={{ listStyle: "none" }}>
                            {stage.details.map((d, j) => (
                              <li key={j} style={{
                                fontSize: 10, color: "#ccccee", marginBottom: 4,
                                paddingLeft: 10, position: "relative", lineHeight: 1.5,
                              }}>
                                <span style={{ position: "absolute", left: 0, color: stage.accent }}>›</span>
                                {d}
                              </li>
                            ))}
                          </ul>
                          <div style={{
                            marginTop: 8, padding: "6px 8px",
                            background: `${stage.accent}15`, borderRadius: 6,
                            fontSize: 10, color: stage.accent, fontWeight: 700, lineHeight: 1.4,
                          }}>
                            ✓ {stage.output}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}

              {/*
               * Spacer div — because the cards are absolutely positioned,
               * the parent has zero height. We push it open with a div
               * whose height matches the tallest collapsed card + node + stem.
               * When a card expands, it overflows naturally downward.
               */}
              <div style={{ height: 200 }} />
            </div>
          </div>

          <p style={{ textAlign: "center", color: "#555577", fontSize: 11, marginTop: 12 }}>
            Click any stage to expand key actions and outputs
          </p>
        </div>
      );
    }

    /* ─── AMBASSADOR TAB ────────────────────────────────────────────────── */

    function AmbassadorTab() {
      return (
        <div>
          <h2 style={{ textAlign: "center", fontWeight: 800, fontSize: 20, marginBottom: 6, color: "#ffffff" }}>
            Ambassador Operating Model
          </h2>
          <p style={{ textAlign: "center", color: "#8888aa", fontSize: 13, marginBottom: 36 }}>
            5-step flow: how each SME lead is converted into an active TikTok user
          </p>

          {/* Steps */}
          <div style={{ position: "relative" }}>
            {/* Vertical connector line */}
            <div
              style={{
                position: "absolute",
                left: 30,
                top: 36,
                bottom: 36,
                width: 2,
                background: "linear-gradient(180deg, #ff9f1c, #f72585, #7209b7, #4cc9f0, #06d6a0)",
                opacity: 0.4,
                borderRadius: 1,
              }}
            />

            {ambassadorSteps.map(step => (
              <div key={step.num} style={{ display: "flex", gap: 20, marginBottom: 16, alignItems: "flex-start" }}>
                {/* Step bubble */}
                <div style={{ width: 60, flexShrink: 0, display: "flex", justifyContent: "center" }}>
                  <div
                    style={{
                      width: 38,
                      height: 38,
                      borderRadius: "50%",
                      background: `${step.color}22`,
                      border: `2px solid ${step.color}`,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontWeight: 800,
                      fontSize: 15,
                      color: step.color,
                      boxShadow: `0 0 14px ${step.color}44`,
                      position: "relative",
                      zIndex: 1,
                    }}
                  >
                    {step.num}
                  </div>
                </div>

                {/* Content card */}
                <div
                  style={{
                    flex: 1,
                    background: "rgba(255,255,255,0.04)",
                    border: `1px solid ${step.color}33`,
                    borderRadius: 12,
                    padding: "16px 18px",
                  }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8, flexWrap: "wrap", gap: 6 }}>
                    <div style={{ fontWeight: 700, fontSize: 15, color: "#ffffff" }}>{step.title}</div>
                    <div
                      style={{
                        background: `${step.color}18`,
                        border: `1px solid ${step.color}44`,
                        borderRadius: 20,
                        padding: "2px 10px",
                        fontSize: 11,
                        color: step.color,
                        fontWeight: 700,
                        whiteSpace: "nowrap",
                      }}
                    >
                      {step.timing}
                    </div>
                  </div>
                  <p style={{ color: "#aaaacc", fontSize: 12, lineHeight: 1.7, margin: 0 }}>{step.desc}</p>
                </div>
              </div>
            ))}
          </div>

          {/* Role distinction table */}
          <div style={{ marginTop: 40 }}>
            <h3 style={{ fontWeight: 800, fontSize: 16, color: "#ffffff", marginBottom: 6, textAlign: "center" }}>
              Division of Roles: OFF Ambassadors vs TikTok SMB Sales
            </h3>
            <p style={{ textAlign: "center", color: "#8888aa", fontSize: 12, marginBottom: 18 }}>
              No duplication — clear scope boundaries and defined handover triggers
            </p>

            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: 0, fontSize: 12, minWidth: 500 }}>
                <thead>
                  <tr>
                    {[
                      { label: "Area", bg: "rgba(255,255,255,0.05)", color: "#8888aa" },
                      { label: "Ambassadors (OFF-led)", bg: "rgba(76,201,240,0.12)", color: "#4cc9f0" },
                      { label: "TikTok SMB Sales", bg: "rgba(254,44,85,0.12)", color: "#fe2c55" },
                    ].map(h => (
                      <th
                        key={h.label}
                        style={{
                          padding: "10px 14px",
                          textAlign: "left",
                          background: h.bg,
                          borderBottom: `2px solid ${h.color}`,
                          color: h.color,
                          fontWeight: 700,
                          fontSize: 11,
                          letterSpacing: 0.5,
                        }}
                      >
                        {h.label}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {roleRows.map((row, i) => (
                    <tr key={i}>
                      <td style={{ padding: "10px 14px", borderBottom: "1px solid rgba(255,255,255,0.06)", background: i % 2 === 0 ? "rgba(255,255,255,0.02)" : "transparent", color: "#8888aa", fontWeight: 700, verticalAlign: "top", lineHeight: 1.6 }}>{row.area}</td>
                      <td style={{ padding: "10px 14px", borderBottom: "1px solid rgba(255,255,255,0.06)", background: i % 2 === 0 ? "rgba(255,255,255,0.02)" : "transparent", color: "#ccccee", verticalAlign: "top", lineHeight: 1.6 }}>{row.off}</td>
                      <td style={{ padding: "10px 14px", borderBottom: "1px solid rgba(255,255,255,0.06)", background: i % 2 === 0 ? "rgba(255,255,255,0.02)" : "transparent", color: "#ccccee", verticalAlign: "top", lineHeight: 1.6 }}>{row.ttk}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    /* ─── KPI BAR ───────────────────────────────────────────────────────── */

    function KpiBar() {
      return (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10, justifyContent: "center", marginTop: 40 }}>
          {kpis.map(k => (
            <div
              key={k.label}
              style={{
                background: `${k.color}10`,
                border: `1px solid ${k.color}33`,
                borderRadius: 10,
                padding: "12px 18px",
                textAlign: "center",
                minWidth: 120,
                flex: "1 1 120px",
                maxWidth: 160,
              }}
            >
              <div style={{ fontWeight: 800, fontSize: 20, color: k.color, marginBottom: 3 }}>{k.value}</div>
              <div style={{ fontSize: 10, color: "#8888aa", lineHeight: 1.4 }}>{k.label}</div>
            </div>
          ))}
        </div>
      );
    }

    /* ─── ROOT APP ──────────────────────────────────────────────────────── */

    function App() {
      const [activeTab, setActiveTab] = useState("timeline");

      return (
        <div style={{ padding: "36px 24px", maxWidth: 1100, margin: "0 auto" }}>

          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: 40 }}>
            <div
              style={{
                display: "inline-block",
